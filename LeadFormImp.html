<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Management System | Patient Inquiry</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
    url('https://images.unsplash.com/photo-1587351021759-3e566b6af7cc?auto=format&fit=crop&w=1600&q=80');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{
    width:100%;
    max-width:850px;
}

.form-card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:10px;
}

.form-title{
    text-align:center;
    color:white;
    font-size:34px;
    font-weight:700;
    margin-bottom:8px;
}

.form-subtitle{
    text-align:center;
    color:#e5e7eb;
    margin-bottom:30px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:span 2;
}

label{
    color:white;
    margin-bottom:8px;
    font-weight:600;
}

input,
select{
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:15px;
    background:white;
    transition:.3s;
}

input:focus,
select:focus{
    box-shadow:0 0 0 4px rgba(255,255,255,.35);
}

::placeholder{
    color:#9ca3af;
}

.required{
    color:#ff6b6b;
}

.submit-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(37,99,235,.45);
}

.footer-text{
    text-align:center;
    color:#e5e7eb;
    margin-top:15px;
    font-size:13px;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .form-group.full{
        grid-column:span 1;
    }

    .form-card{
        padding:25px;
    }

    .form-title{
        font-size:28px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="form-card">

<div class="logo">🏥</div>

<h1 class="form-title">
Hospital Management System
</h1>

<p class="form-subtitle">
Submit your inquiry and our healthcare team will contact you shortly.
</p>

<form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8"
      method="POST">

    <!-- Salesforce Org ID -->
    <input type="hidden" name="oid" value="00Dg500000CWMeP">

    <!-- Redirect URL -->
    <input type="hidden" name="retURL" value="https://www.google.com">

    <!-- Static Lead Source -->
    <input type="hidden" name="lead_source" value="Social Media">

    <div class="form-grid">

        <div class="form-group">
            <label for="first_name">First Name</label>
            <input
                type="text"
                id="first_name"
                name="first_name"
                maxlength="40"
                placeholder="Enter First Name">
        </div>

        <div class="form-group">
            <label for="last_name">
                Last Name <span class="required">*</span>
            </label>
            <input
                type="text"
                id="last_name"
                name="last_name"
                maxlength="80"
                placeholder="Enter Last Name"
                required>
        </div>

        <div class="form-group full">
            <label for="email">Email 
                <span class="required">*</span>
            </label>
            <input
                type="email"
                id="email"
                name="email"
                maxlength="80"
                placeholder="example@email.com">
        </div>

        <div class="form-group">
            <label for="company">
                Company
                <span class="required">*</span>
            </label>
            <input
                type="text"
                id="company"
                name="company"
                maxlength="40"
                placeholder="Enter Company Name"
                required>
        </div>

        <div class="form-group">
            <label for="city">City</label>
            <input
                type="text"
                id="city"
                name="city"
                maxlength="40"
                placeholder="Enter City">
        </div>

        <div class="form-group">
            <label for="country_code">Country</label>
            <select id="country_code" name="country_code">
                <option value="">Select Country</option>
                <option value="PK">Pakistan</option>
                <option value="US">United States</option>
                <option value="GB">United Kingdom</option>
                <option value="CA">Canada</option>
                <option value="AU">Australia</option>
                <option value="IN">India</option>
                <option value="AE">United Arab Emirates</option>
                <option value="SA">Saudi Arabia</option>
            </select>
        </div>

        <div class="form-group">
            <label for="annual_revenue">Annual Revenue</label>
            <input
                type="number"
                id="annual_revenue"
                name="annual_revenue"
                placeholder="e.g. 500000">
        </div>

        <div class="form-group full">
            <button type="submit" class="submit-btn">
                Submit 
            </button>
        </div>

    </div>

</form>

<p class="footer-text">
© 2025 Hospital Management System | Powered by Salesforce CRM
</p>

</div>
</div>

</body>
</html>
